# REANA authentication profile for direct CERN Keycloak/OIDC.
#
# Use together with private values that provide:
#   secrets.auth.REANA_AUTH_WEB_CLIENT_SECRET
#   auth.cernGroupBackend.enabled=true if enabling CERN group sync
# and adjust client ids, audience, and role mappings to the registered CERN
# Application Portal clients.

keycloak:
  enabled: false

auth:
  issuer: https://auth.cern.ch/auth/realms/cern
  # Leave endpoint overrides empty so reana-server resolves them from
  # /.well-known/openid-configuration. Set openidConfigUrl only if the
  # server needs a different backchannel URL.
  openidConfigUrl: ""
  audience: ""
  clientId: reana-cli
  webClientId: reana-server
  bffEnabled: true
  scopes: "openid profile email"
  rolesClaim: reana_roles
  requiredRole: "reana:user"
  roleSources:
    # Example for a CERN/Keycloak client role named `user` on the REANA web
    # client. Override in private values if the registered client id or role
    # names differ.
    - path: resource_access.reana-server.roles
      map:
        user: reana:user
        admin: reana:admin
  groupBackends: []
  cernGroupBackend:
    enabled: false
    # Enable this when the configured CERN Application Portal client can use
    # client credentials to read the Authorization Service API. By default this
    # reuses `auth.webClientId` and `secrets.auth.REANA_AUTH_WEB_CLIENT_SECRET`.
    # The server-side backend defaults cover the CERN production API, token
    # endpoint, audience, and `cern_upn` identity claim; override the fields
    # below only for non-standard deployments.
    provider: cern
    clientId: ""
    clientSecretEnv: REANA_AUTH_WEB_CLIENT_SECRET
